<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>"Hello World"</title>
    <style>
        body{
            background-color: rgb(204, 197, 197); /* comentando em css3 */
            color: black;
            font: normal 19pt arial;
        }
        h1{
            color: black
        }
    </style>
</head>
<body>
    <h1>3. Hello World</h1> <!--comentando em html-->
    <p>terceiro programa</p>
    <script>
        var n1 = Number(window.prompt('Digite um numero: '))
        var n2 = Number(window.prompt('Digite outro número: ')) 
        var soma = n1 + n2 
        window.alert(`A soma entre ${n1} e ${n2} é ${soma}`)
        
    </script>
</body>
</html>
