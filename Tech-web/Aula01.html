    <!-- 
        Modelo cliente servidor trata-se de: Todo conteudo esta armazenado em um servidor;
        Assim, quando o cliente acessa um site, na verdade está enviado um request para o servidor solicitando determinado tipo de dado; 
        O dado solicitado trafega na internet via http, e retorna para uma interface que terá uma tecnologia de interpretação de texto; 
        Toda tec web circula na internet via http (HyperText Transfer Protocol)
        Toda ação na web possui um par chamado de requisição e resposta; 
        Requisição: feita pelo cliente, trafego na internet, servidor; 
        Requisição - composição:
         -> Linha da requisiçaõ: MÉTODO / URL / VERSÃO: Quando precionado enter, o METODO usado é o GET, POST, DELETE, PUT; A URL é o endereço e a VERSAO é a versão usada do HTTP; 
         -> Cabeçalho da requisição: São valores de METADADOs que auxiliao na requisiçao; ex: Accept-Encodin: possui o valor de gzip, deflate, br; 
         - Corpo da requisição: Parte opcional da requisição, dados que o usuario vai passar como por exemplo a solicitação de login e senha para que o servidor acione uma ação. 
         São no formato JSON e URLENCODING;
